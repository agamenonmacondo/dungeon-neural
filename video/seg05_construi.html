<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    color: #e0e0e0;
    padding: 100px;
  }
  .section-title {
    font-size: 2.8em;
    color: #ff4444;
    letter-spacing: 8px;
    margin-bottom: 50px;
    text-shadow: 0 0 40px #ff444466, 0 0 80px #ff444433;
  }
  .content {
    text-align: center;
    font-size: 1.5em;
    line-height: 2.4;
    max-width: 1400px;
  }
  .line {
    color: #d0d0d0;
    text-shadow: 0 0 15px #ffffff11;
  }
  .line.empty {
    height: 1.5em;
  }
  .glow-line {
    width: 500px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ff4444, transparent);
    margin: 0 auto 50px auto;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div class="section-title">48 KILOBYTES</div>
  <div class="glow-line"></div>
  <div class="content">
    <p class="line">Un archivo. Cero dependencias.</p>
<p class="line empty">&nbsp;</p>
<p class="line">Generación BSP procedural.</p>
<p class="line">9 tipos de enemigos.</p>
<p class="line">Nigromante. Dragón.</p>
<p class="line">Fog of war con raycasting.</p>
<p class="line">Audio procedural en tiempo real.</p>
<p class="line empty">&nbsp;</p>
<p class="line">Cada espada produce una onda</p>
<p class="line">que nunca existió antes.</p>
  </div>
</body>
</html>
