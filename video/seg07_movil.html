<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    color: #e0e0e0;
    padding: 100px;
  }
  .section-title {
    font-size: 2.8em;
    color: #00ff88;
    letter-spacing: 8px;
    margin-bottom: 50px;
    text-shadow: 0 0 40px #00ff8866, 0 0 80px #00ff8833;
  }
  .content {
    text-align: center;
    font-size: 1.5em;
    line-height: 2.4;
    max-width: 1400px;
  }
  .line {
    color: #d0d0d0;
    text-shadow: 0 0 15px #ffffff11;
  }
  .line.empty {
    height: 1.5em;
  }
  .glow-line {
    width: 500px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00ff88, transparent);
    margin: 0 auto 50px auto;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div class="section-title">EN TU CELULAR</div>
  <div class="glow-line"></div>
  <div class="content">
    <p class="line">Controles táctiles.</p>
<p class="line">Log de mensajes.</p>
<p class="line">Inventario completo.</p>
<p class="line empty">&nbsp;</p>
<p class="line">En el colectivo.</p>
<p class="line">En la fila del super.</p>
<p class="line">En los 5 minutos</p>
<p class="line">que se convierten en 45.</p>
  </div>
</body>
</html>
