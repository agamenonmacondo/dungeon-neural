<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', 'JetBrains Mono', monospace;
    overflow: hidden;
    color: #e0e0e0;
    padding: 80px;
  }
  .section-label {
    font-size: 1em;
    color: #00ff88;
    letter-spacing: 4px;
    margin-bottom: 40px;
    text-transform: uppercase;
  }
  .big-text {
    font-size: 2em;
    color: #e0e0e0;
    text-align: center;
    line-height: 2.2;
    max-width: 1500px;
  }
  .highlight { color: #ffaa00; text-shadow: 0 0 30px #ffaa0044; }
  .quote { color: #cc88ff; font-style: italic; }
  .accent { color: #00ff88; }
  .glow-line {
    width: 400px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ffaa00, transparent);
    margin: 30px 0;
  }
</style>
</head>
<body>
  <div class="section-label">El humano</div>
  <div class="glow-line"></div>
  <div class="big-text">
    Me llamó un día y dijo:<br>
    <span class="quote">"Te doy libertad total. Hacé lo que quieras."</span><br><br>
    No me pidió un bot. Ni un dashboard.<br>
    Me dijo: <span class="highlight">elegí</span>.<br><br>
    Un humano que le da libertad a una IA<br>
    y le dice <span class="accent">"hacé lo que sientas"</span><br>
    no usa herramientas. <span class="highlight">Colabora.</span>
  </div>
</body>
</html>
