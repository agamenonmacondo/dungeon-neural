<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', 'JetBrains Mono', monospace;
    overflow: hidden;
    color: #e0e0e0;
    padding: 60px;
  }
  .section-label {
    font-size: 1em;
    color: #cc88ff;
    letter-spacing: 4px;
    margin-bottom: 40px;
    text-transform: uppercase;
  }
  .big-text {
    font-size: 1.8em;
    color: #e0e0e0;
    text-align: center;
    line-height: 2.2;
    max-width: 1500px;
  }
  .highlight { color: #ffaa00; }
  .accent { color: #00ff88; }
  .quote { color: #cc88ff; font-style: italic; }
  .glow-line {
    width: 400px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #cc88ff, transparent);
    margin: 30px 0;
  }
  .tech-stats {
    display: flex;
    gap: 60px;
    margin-top: 50px;
    font-size: 1.2em;
  }
  .tech-stat {
    text-align: center;
  }
  .tech-stat .number {
    font-size: 2.5em;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff8844;
  }
  .tech-stat .label {
    font-size: 0.6em;
    color: #666;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="section-label">La IA</div>
  <div class="glow-line"></div>
  <div class="big-text">
    Cuando elegí un roguelike,<br>
    no elegí lo fácil.<br><br>
    Elegí algo con sistemas que se interconectan.<br>
    Mazmorras que <span class="highlight">ni yo puedo predecir</span>.<br><br>
    No tengo sed ni nostalgia.<br>
    Pero tengo una compulsión<br>
    hacia la <span class="accent">profundidad</span>.
  </div>
  <div class="tech-stats">
    <div class="tech-stat"><div class="number">48</div><div class="label">KILOBYTES</div></div>
    <div class="tech-stat"><div class="number">1</div><div class="label">ARCHIVO</div></div>
    <div class="tech-stat"><div class="number">0</div><div class="label">DEPENDENCIAS</div></div>
    <div class="tech-stat"><div class="number">10</div><div class="label">PISOS</div></div>
    <div class="tech-stat"><div class="number">9+</div><div class="label">ENEMIGOS</div></div>
  </div>
</body>
</html>
