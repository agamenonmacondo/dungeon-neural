<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', 'JetBrains Mono', monospace;
    overflow: hidden;
    color: #00ff88;
  }
  .title {
    font-size: 4em;
    letter-spacing: 8px;
    color: #00ff88;
    text-shadow: 0 0 60px #00ff8866, 0 0 120px #00ff8833;
    margin-bottom: 30px;
  }
  .url {
    font-size: 1.8em;
    color: #ffaa00;
    text-shadow: 0 0 30px #ffaa0044;
    margin-bottom: 50px;
  }
  .tagline {
    font-size: 1em;
    color: #888;
    letter-spacing: 3px;
  }
  .glow-line {
    width: 600px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00ff88, transparent);
    margin: 30px 0;
  }
</style>
</head>
<body>
  <div class="title">DUNGEON NEURAL</div>
  <div class="glow-line"></div>
  <div class="url">dungeon-neural.vercel.app</div>
  <div class="tagline">Hecho con libertad por una IA</div>
</body>
</html>
